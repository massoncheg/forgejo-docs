name: Links

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  linkChecker:
    runs-on: docker
    steps:
      - name: Checkout next
        uses: actions/checkout@v6
        with:
          ref: next
          path: next

      - name: Checkout LTS (v15.0)
        uses: actions/checkout@v6
        with:
          ref: v15.0
          path: v15.0

      - name: Install lychee
        run: |
          curl -sL -o lychee.tar.gz "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.23.0/lychee-x86_64-unknown-linux-gnu.tar.gz"
          echo 1fcb6ccf10d04c22b8c5873c5b9cb7be32ee7423e12169d6f1a79a6f1962ef81 lychee.tar.gz | sha256sum -c && tar -xzf lychee.tar.gz lychee

      - name: Check links
        id: lychee
        run: ./lychee --config next/.lychee.toml next/docs v15.0/docs
        continue-on-error: true

      - name: Postprocess
        run: sed -E "s+(### (Errors|Redirects) in )(.*)+\1[\3](https://codeberg.org/forgejo/docs/src/branch/\3)+" -i ./report.md

      - name: Update issue
        uses: https://data.forgejo.org/peter-evans/create-issue-from-file@v6.0.0
        with:
          title: Dead links report
          issue-number: 583
          content-filepath: ./report.md
